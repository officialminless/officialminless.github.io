<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minless | Less Is More</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}
body{
background:#0f0f0f;
color:white;
}
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}
h1{
font-size:5rem;
letter-spacing:10px;
}
.tagline{
margin-top:15px;
font-size:1.2rem;
opacity:.8;
}
.shop-btn{
margin-top:30px;
padding:15px 35px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:50px;
transition:.3s;
}
.shop-btn:hover{
transform:scale(1.05);
}
.products{
padding:80px 10%;
}
.products h2{
text-align:center;
margin-bottom:40px;
font-size:2.5rem;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}
.card{
background:#181818;
border-radius:20px;
overflow:hidden;
}
.card img{
width:100%;
height:350px;
object-fit:cover;
}
.card-content{
padding:20px;
}
.card h3{
margin-bottom:10px;
}
.price{
font-size:1.3rem;
margin:15px 0;
font-weight:bold;
}
.buy-btn{
display:inline-block;
padding:12px 25px;
background:white;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}
footer{
padding:50px;
text-align:center;
opacity:.6;
}
</style>
</head>
<body>
<header>
<h1>MINLESS</h1>
<p class="tagline">LESS IS MORE</p>
<a href="#shop" class="shop-btn">SHOP NOW</a>
</header>
<section class="products" id="shop">
<h2>Featured Drops</h2>
<div class="grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=1200" alt="Hoodie">
<div class="card-content">
<h3>All In One Hoodie</h3>
<p>Heavyweight premium hoodie built for everyday wear.</p>
<p class="price">$22.99</p>
<a class="buy-btn" href="#">Buy Now</a>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1?w=1200" alt="Hoodie">
<div class="card-content">
<h3>MINLESS Hoodie</h3>
<p>Minimal design with oversized comfort.</p>
<p class="price">$19.99</p>
<a class="buy-btn" href="#">Buy Now</a>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=1200" alt="Hoodie">
<div class="card-content">
<h3>Core Essential</h3>
<p>LIM Hoodie</p>
<p class="price">$18.99</p>
<a class="buy-btn" href="#">Buy Now</a>
</div>
</div>
</div>
</section>
<footer>
© 2026 MINLESS — LESS IS MORE
</footer>
</body>
</html>
